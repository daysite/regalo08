<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat especial ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ffd6e7, #ffeef5);
}

/* LOGIN */
#login {
  height: calc(var(--vh) * 100);
  display: flex;
  justify-content: center;
  align-items: center;
}

.login-box {
  width: 300px;
  background: white;
  border-radius: 20px;
  padding: 20px;
  text-align: center;
  position: relative;
}

.login-box img {
  position: absolute;
  top: -15px;
  right: -15px;
  width: 70px;
}

.login-box h3 {
  color: #ff4d88;
}

.login-box input {
  width: 90%;
  padding: 8px;
  margin-top: 8px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

.login-box button {
  margin-top: 10px;
  padding: 8px 15px;
  border-radius: 20px;
  border: none;
  background: #ff4d88;
  color: white;
}

/* MAGIA */
#magia {
  display: none;
  position: fixed;
  inset: 0;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #ffb6d9, #ffd6e7);
  color: white;
  font-size: 20px;
  text-align: center;
  padding: 20px;
}

/* APP */
#app {
  width: 100%;
  height: calc(var(--vh) * 100);
  display: none;
  flex-direction: column;
  background: #0b141a;
}

/* HEADER */
#header {
  display: flex;
  align-items: center;
  padding: 6px;
  background: #202c33;
  color: white;
}

#header img {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  margin-right: 6px;
}

/* CHAT */
#chatContainer {
  display: none;
  flex: 1;
  flex-direction: column;
}

#chat {
  flex: 1;
  padding: 6px;
  overflow-y: auto;
}

/* MENSAJES */
.mensaje {
  max-width: 75%;
  padding: 6px 8px;
  margin: 3px;
  border-radius: 8px;
  font-size: 12px;
  color: white;
}

.enviado {
  background: #005c4b;
  margin-left: auto;
}

.recibido {
  background: #202c33;
}

/* INPUT */
#inputArea {
  display: flex;
  padding: 6px;
  background: #202c33;
  position: sticky;
  bottom: 0;
}

#inputMensaje {
  flex: 1;
  padding: 6px;
  border-radius: 15px;
  border: none;
  background: #2a3942;
  color: white;
}

#inputArea button {
  margin-left: 5px;
  padding: 6px 10px;
  border-radius: 50%;
}

/* CARTA (ARREGLADA) */
#carta {
  display: none;
  flex: 1;
  justify-content: center;
  align-items: center;
  background: #0b141a; /* SOLO ESTO CAMBIÓ */
}

.carta-box {
  max-width: 320px;
  width: 90%;
  max-height: 80vh;
  overflow-y: auto;
  padding: 20px;
  border-radius: 15px;
  background: #111b21;
  color: white;
  text-align: center;
  font-size: 13px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">

    <img src="https://i.imgur.com/3QZQZ6P.png">

    <h3>Hola Nayeli 💖</h3>
    <p>Este regalo fue hecho con mucho cariño ✨</p>

    <p><strong>¿Cuál es tu nombre?</strong></p>
    <input type="text" id="clave">

    <button onclick="verificar()">Entrar</button>

    <p id="error" style="color:red; display:none;">❌ Incorrecto</p>

    <div id="pistaBox" style="display:none;">
      <p>¿Quieres una pista?</p>
      <button onclick="mostrarPista()">Ver</button>
    </div>

    <p id="pista"></p>

  </div>
</div>

<!-- MAGIA -->
<div id="magia">
  <div id="textoMagico"></div>
</div>

<!-- APP -->
<div id="app">

<div id="chatContainer">

  <div id="header">
    <img src="perfil.jpeg">
    <div>
      <strong>Bot de Daniel ❤️</strong><br>
      <small>en línea</small>
    </div>
  </div>

  <div id="chat"></div>

  <div id="inputArea">
    <input type="text" id="inputMensaje">
    <button onclick="enviarMensaje()">➤</button>
  </div>
</div>

<!-- CARTA -->
<div id="carta">
  <div class="carta-box">
    <h2>💌 Para Nayeli ❤️</h2>
    <p id="textoCarta"></p>
  </div>
</div>

</div>

<script>
let paso = 0;
let intentosNo = 0;
let seguridad = 0;

/* LOGIN */
function verificar() {
  let clave = document.getElementById("clave").value.toLowerCase();

  if (clave === "nayeli juanita") {
    document.getElementById("login").style.display = "none";
    document.getElementById("magia").style.display = "flex";
    iniciarMagia();
  } else {
    document.getElementById("error").style.display = "block";
    document.getElementById("pistaBox").style.display = "block";
  }
}

function mostrarPista() {
  document.getElementById("pista").innerText =
    "💡 Pista: es un nombre que Emerson siempre te ha puesto";
}

/* MAGIA */
function iniciarMagia() {
  const texto = "Hola Nayeli 💖 este regalo fue hecho especialmente para ti";

  let i = 0;

  let intervalo = setInterval(() => {
    document.getElementById("textoMagico").innerHTML += texto[i];
    i++;

    if (i >= texto.length) {
      clearInterval(intervalo);

      setTimeout(() => {
        document.getElementById("magia").style.display = "none";
        document.getElementById("app").style.display = "flex";
        document.getElementById("chatContainer").style.display = "flex";
        setTimeout(() => bot("Hola Nayeli ❤️"), 600);
      }, 1500);
    }
  }, 40);
}

/* CHAT (NO MODIFICADO) */
function bot(texto) {
  let msg = document.createElement("div");
  msg.className = "mensaje recibido";
  msg.innerHTML = texto;
  document.getElementById("chat").appendChild(msg);
  scroll();
}

function user(texto) {
  let msg = document.createElement("div");
  msg.className = "mensaje enviado";
  msg.innerHTML = texto;
  document.getElementById("chat").appendChild(msg);
  scroll();
}

function scroll() {
  let chat = document.getElementById("chat");
  chat.scrollTop = chat.scrollHeight;
}

function enviarMensaje() {
  let input = document.getElementById("inputMensaje");
  let texto = input.value.toLowerCase().trim();

  if (!texto) return;

  user(input.value);
  input.value = "";

  setTimeout(() => responder(texto), 600);
}

function responder(texto) {

  if (paso === 0) {
    if (texto.includes("hola")) {
      bot("Hola 😊");
      bot("¿Cómo estás Nayeli?");
      bot("Me comentaron que hoy es tu cumpleaños 🎂");
      bot("¿Es correcto?");
      paso = 1;
    } else {
      bot("di hola primero 😜");
    }
    return;
  }

  if (paso === 1) {
    if (texto.includes("si") || texto.includes("sí")) {
      bot("Ya lo sabía 😏");
      bot("Por eso vengo a entregarte esta sorpresa 🎁");
      bot("¿Quieres verla?");
      paso = 2;
      return;
    }
  }

  if (paso === 2) {

    if (seguridad === 0 && (texto.includes("si") || texto.includes("sí"))) {
      bot("Pregunta de seguridad 💖");
      bot("¿Dónde fue el primer lugar donde nos vimos?");
      seguridad = 1;
      return;
    }

    if (seguridad === 1) {
      if (texto.includes("lurin")) {
        bot("Muy bien 😍");
        bot("¿Quién dio el primer beso?");
        seguridad = 2;
      } else {
        bot("mmm intenta otra vez 😜");
      }
      return;
    }

    if (seguridad === 2) {
      if (texto.includes("emerson")) {
        bot("Perfecto ❤️");

        setTimeout(() => {
          document.getElementById("chatContainer").style.display = "none";
          document.getElementById("carta").style.display = "flex";
          escribirCarta();
        }, 1200);
      }
    }
  }
}

/* ✨ MAQUINA DE ESCRIBIR */
function escribirCarta() {
  const texto = `Hola Nayeli ❤️

Este regalo fue hecho con mucho cariño...

No soy perfecto, pero contigo nacen cosas bonitas en mí.
Me nace cuidarte, hacerte feliz, pensar en cada detalle.

Cada momento contigo vale demasiado para mí.

Y sí… este no es el único regalo 🎁
Te debo otro, uno mejor…
y espero poder dártelo muy pronto ❤️`;

  let i = 0;

  function escribir() {
    if (i < texto.length) {
      document.getElementById("textoCarta").innerHTML += texto.charAt(i);
      i++;
      setTimeout(escribir, 30);
    }
  }

  escribir();
}
</script>

</body>
</html>
