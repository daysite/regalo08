<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat especial ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b141a;
}

/* APP */
#app {
  width: 100%;
  height: 100dvh; /* 🔥 SOLUCIÓN CLAVE */
  display: flex;
  flex-direction: column;
  background: #0b141a;
}

/* HEADER */
#header {
  display: flex;
  align-items: center;
  padding: 6px;
  background: #202c33;
  color: white;
}

#header img {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  margin-right: 6px;
}

/* CHAT */
#chatContainer {
  display: none;
  flex: 1;
  display: flex;
  flex-direction: column;
}

#chat {
  flex: 1;
  padding: 6px;
  overflow-y: auto;
}

/* MENSAJES */
.mensaje {
  max-width: 75%;
  padding: 6px 8px;
  margin: 3px;
  border-radius: 8px;
  font-size: 12px;
  color: white;
}

.enviado {
  background: #005c4b;
  margin-left: auto;
}

.recibido {
  background: #202c33;
}

/* HORA */
.hora {
  font-size: 8px;
  color: #aaa;
  text-align: right;
}

/* INPUT */
#inputArea {
  display: flex;
  padding: 6px;
  background: #202c33;
}

#inputMensaje {
  flex: 1;
  padding: 6px;
  border-radius: 15px;
  border: none;
  background: #2a3942;
  color: white;
  font-size: 12px;
}

#inputArea button {
  margin-left: 5px;
  padding: 6px 10px;
  border-radius: 50%;
}

/* INICIO */
#inicio {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  color: white;
}

/* CARTA */
#carta {
  display: none;
  flex: 1;
  justify-content: center;
  align-items: center;
  text-align: center;
  color: white;
}

/* 💻 PC */
@media (min-width: 600px) {
  body {
    display: flex;
    justify-content: center;
    align-items: center;
  }

  #app {
    max-width: 400px;
    height: 90vh;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 0 25px rgba(0,0,0,0.6);
  }
}
</style>
</head>

<body>

<div id="app">

<div id="inicio">
  <h3>Tengo algo para ti ❤️</h3>
  <button onclick="iniciar()">Entrar</button>
</div>

<div id="chatContainer">

  <div id="header">
    <img src="perfil.jpeg">
    <div>
      <strong>Bot de Daniel ❤️</strong><br>
      <small>en línea</small>
    </div>
  </div>

  <div id="chat"></div>

  <div id="inputArea">
    <input type="text" id="inputMensaje" placeholder="Mensaje...">
    <button onclick="enviarMensaje()">➤</button>
  </div>
</div>

<div id="carta">
  <div>
    <h2>🎁 Tu regalo</h2>
    <p>Daniel quería decirte que eres muy importante para él ❤️</p>
  </div>
</div>

</div>

<script>
let paso = 0;

function hora() {
  let d = new Date();
  return d.getHours() + ":" + ("0" + d.getMinutes()).slice(-2);
}

function iniciar() {
  document.getElementById("inicio").style.display = "none";
  document.getElementById("chatContainer").style.display = "flex";

  setTimeout(() => bot("Hola..."), 500);
}

function bot(texto) {
  let msg = document.createElement("div");
  msg.className = "mensaje recibido";
  msg.innerHTML = texto + `<div class="hora">${hora()}</div>`;
  document.getElementById("chat").appendChild(msg);
  scroll();
}

function user(texto) {
  let msg = document.createElement("div");
  msg.className = "mensaje enviado";
  msg.innerHTML = texto + `<div class="hora">${hora()}</div>`;
  document.getElementById("chat").appendChild(msg);
  scroll();
}

function scroll() {
  let chat = document.getElementById("chat");
  chat.scrollTop = chat.scrollHeight;
}

function enviarMensaje() {
  let input = document.getElementById("inputMensaje");
  let texto = input.value.trim().toLowerCase();

  if (!texto) return;

  user(input.value);
  input.value = "";

  setTimeout(() => responder(texto), 500);
}

function responder(texto) {

  if (paso === 0) {
    bot("Hola 😊");
    bot("Soy un bot 🤖");
    bot("Vengo de parte de Daniel ❤️");
    bot("¿Quieres ver tu regalo?");
    paso = 1;
    return;
  }

  if (paso === 1) {

    if (texto.includes("si") || texto.includes("sí")) {
      bot("Sabía que dirías que sí 😏");
      setTimeout(() => {
        document.getElementById("chatContainer").style.display = "none";
        document.getElementById("carta").style.display = "flex";
      }, 1000);
      return;
    }

    bot("responde 'sí' 😜");
  }
}
</script>

</body>
</html>
