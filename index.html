<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat especial ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #ffd6e7; /* 💖 hello kitty */
}

/* LOGIN */
#login {
  height: calc(var(--vh) * 100);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 20px;
  color: #ff4d88;
}

#login input {
  padding: 8px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
}

#login button {
  margin-top: 10px;
  background: #ff4d88;
}

/* APP (NO CAMBIADO) */
#app {
  width: 100%;
  height: calc(var(--vh) * 100);
  display: none;
  flex-direction: column;
  background: #0b141a;
}

/* INICIO */
#inicio {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  color: white;
}

button {
  padding: 8px 14px;
  border-radius: 20px;
  border: none;
  background: #25d366;
  color: white;
}

/* HEADER */
#header {
  display: flex;
  align-items: center;
  padding: 6px;
  background: #202c33;
  color: white;
}

#header img {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  margin-right: 6px;
}

/* CHAT */
#chatContainer {
  display: none;
  flex: 1;
  flex-direction: column;
}

#chat {
  flex: 1;
  padding: 6px;
  overflow-y: auto;
}

/* MENSAJES */
.mensaje {
  max-width: 75%;
  padding: 6px 8px;
  margin: 3px;
  border-radius: 8px;
  font-size: 12px;
  color: white;
}

.enviado {
  background: #005c4b;
  margin-left: auto;
}

.recibido {
  background: #202c33;
}

/* INPUT */
#inputArea {
  display: flex;
  padding: 6px;
  background: #202c33;
  position: sticky;
  bottom: 0;
}

#inputMensaje {
  flex: 1;
  padding: 6px;
  border-radius: 15px;
  border: none;
  background: #2a3942;
  color: white;
}

#inputArea button {
  margin-left: 5px;
  padding: 6px 10px;
  border-radius: 50%;
}

/* CARTA */
#carta {
  display: none;
  flex: 1;
  justify-content: center;
  align-items: center;
  text-align: center;
  color: white;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h3>Hola Nayeli 💖</h3>
  <p>
    Este regalo fue hecho con mucho cariño y un poco de estrés 😅<br>
    Pero antes de continuar...<br>
    dime la palabra clave para confirmar que eres tú 💕
  </p>

  <input type="text" id="clave" placeholder="Palabra clave...">
  <button onclick="verificar()">Entrar</button>

  <p id="pista" style="margin-top:10px;"></p>
</div>

<!-- APP ORIGINAL -->
<div id="app">

<div id="inicio">
  <h3>Tengo algo para ti ❤️</h3>
  <button onclick="iniciar()">Entrar</button>
</div>

<div id="chatContainer">

  <div id="header">
    <img src="perfil.jpeg">
    <div>
      <strong>Bot de Daniel ❤️</strong><br>
      <small>en línea</small>
    </div>
  </div>

  <div id="chat"></div>

  <div id="inputArea">
    <input type="text" id="inputMensaje" placeholder="Mensaje...">
    <button onclick="enviarMensaje()">➤</button>
  </div>
</div>

<div id="carta">
  <div>
    <h2>🎁 Feliz cumpleaños Nayeli ❤️</h2>
    <p>Este detalle es para recordarte lo especial que eres ✨</p>
  </div>
</div>

</div>

<script>
let paso = 0;
let intentosLogin = 0;

/* LOGIN */
function verificar() {
  let clave = document.getElementById("clave").value.toLowerCase();

  if (clave === "nayeli juanita") {
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "flex";
  } else {
    intentosLogin++;
    document.getElementById("pista").innerText =
      "💡 Pista: es un nombre que Emerson siempre te ha puesto";
  }
}

/* ALTURA */
function ajustarAltura() {
  const vh = window.visualViewport
    ? window.visualViewport.height * 0.01
    : window.innerHeight * 0.01;

  document.documentElement.style.setProperty('--vh', `${vh}px`);
}
window.addEventListener('load', ajustarAltura);
window.addEventListener('resize', ajustarAltura);

/* ENTER */
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("inputMensaje").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
      enviarMensaje();
    }
  });
});

/* CHAT (NO TOCADO) */
function iniciar() {
  document.getElementById("inicio").style.display = "none";
  document.getElementById("chatContainer").style.display = "flex";

  setTimeout(() => bot("Hola Nayeli ❤️"), 600);
}

function bot(texto) {
  let msg = document.createElement("div");
  msg.className = "mensaje recibido";
  msg.innerHTML = texto;
  document.getElementById("chat").appendChild(msg);
}

function user(texto) {
  let msg = document.createElement("div");
  msg.className = "mensaje enviado";
  msg.innerHTML = texto;
  document.getElementById("chat").appendChild(msg);
}

function enviarMensaje() {
  let input = document.getElementById("inputMensaje");
  let texto = input.value.toLowerCase().trim();

  if (!texto) return;

  user(input.value);
  input.value = "";

  setTimeout(() => responder(texto), 600);
}

function responder(texto) {
  if (paso === 0) {
    if (texto.includes("hola")) {
      bot("Hola 😊");
      bot("¿Cómo estás Nayeli?");
      bot("Me comentaron que hoy es tu cumpleaños 🎂");
      bot("¿Es correcto?");
      paso = 1;
    } else {
      bot("di hola primero 😜");
    }
    return;
  }

  if (paso === 1) {
    if (texto.includes("si") || texto.includes("sí")) {
      bot("Ya lo sabía 😏");
      bot("Por eso vengo a entregarte esta sorpresa 🎁");
      bot("¿Quieres verla?");
      paso = 2;
      return;
    }
    bot("😅 creo que sí es...");
  }

  if (paso === 2) {
    if (texto.includes("si") || texto.includes("sí")) {
      bot("Sabía que dirías que sí 😌");
      setTimeout(() => {
        document.getElementById("chatContainer").style.display = "none";
        document.getElementById("carta").style.display = "flex";
      }, 1200);
      return;
    }
    bot("🥺 di que sí...");
  }
}
</script>

</body>
</html>
