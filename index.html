<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat especial ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b141a;
}

/* LOGIN */
#login {
  height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #ffd6e7, #ffeef5);
}

.login-box {
  width: 300px;
  max-width: 90%;
  background: white;
  border-radius: 20px;
  padding: 20px;
  text-align: center;
  position: relative;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.login-box img {
  position: absolute;
  top: -15px;
  right: -15px;
  width: 70px;
}

/* MAGIA */
#magia {
  display: none;
  position: fixed;
  inset: 0;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #ffb6d9, #ffd6e7);
  color: white;
  text-align: center;
  padding: 20px;
}

/* APP */
#app {
  width: 100%;
  height: 100dvh;
  display: none;
  flex-direction: column;
  background: #0b141a;
}

/* CHAT */
#chatContainer {
  display: none;
  flex: 1;
  flex-direction: column;
  min-height: 0;
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 6px;
}

/* MENSAJES */
.mensaje {
  max-width: 75%;
  padding: 6px 8px;
  margin: 3px;
  border-radius: 8px;
  font-size: 13px;
  color: white;
}

.enviado {
  background: #005c4b;
  margin-left: auto;
}

.recibido {
  background: #202c33;
}

/* HEADER */
#header {
  display: flex;
  align-items: center;
  padding: 6px;
  background: #202c33;
  color: white;
}

#header img {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  margin-right: 6px;
}

/* INPUT */
#inputArea {
  display: flex;
  padding: 6px;
  background: #202c33;
}

#inputMensaje {
  flex: 1;
  padding: 8px;
  border-radius: 15px;
  border: none;
  background: #2a3942;
  color: white;
}

#inputArea button {
  margin-left: 5px;
}

/* SOBRE */
#sobre {
  display: none;
  flex: 1;
  justify-content: center;
  align-items: center;
  color: white;
}

.sobre-box {
  font-size: 50px;
  cursor: pointer;
  text-align: center;
  animation: latido 1.5s infinite;
}

@keyframes latido {
  50% { transform: scale(1.1); }
}

/* CARTA */
#carta {
  display: none;
  flex: 1;
  justify-content: center;
  align-items: center;
  color: white;
}

.carta-contenido {
  max-width: 320px;
  width: 90%;
  text-align: center;
}

.foto {
  width: 100%;
  border-radius: 15px;
  opacity: 0;
  transform: scale(0.8);
}

#tituloCarta, #textoCarta {
  opacity: 0;
  transform: translateY(20px);
}

.mostrar-foto { animation: aparecerFoto 1s forwards; }
.mostrar-texto { animation: aparecerTexto 1s forwards; }

@keyframes aparecerFoto {
  to { opacity: 1; transform: scale(1); }
}

@keyframes aparecerTexto {
  to { opacity: 1; transform: translateY(0); }
}

/* 📱 RESPONSIVE */
@media (max-width: 600px) {
  .mensaje {
    font-size: 12px;
  }

  #inputMensaje {
    font-size: 14px;
  }
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <img src="https://i.imgur.com/3QZQZ6P.png">
    <h3>Hola Nayeli 💖</h3>
    <p>Este regalo fue hecho con mucho cariño ✨</p>

    <p><strong>¿Cuál es tu nombre?</strong></p>
    <input type="text" id="clave">
    <button onclick="verificar()">Entrar</button>

    <p id="error" style="display:none; color:red;">❌ Incorrecto</p>
    <div id="pistaBox" style="display:none;">
      <button onclick="mostrarPista()">Ver pista</button>
    </div>
    <p id="pista"></p>
  </div>
</div>

<!-- MAGIA -->
<div id="magia">
  <div id="textoMagico"></div>
</div>

<!-- APP -->
<div id="app">

<div id="chatContainer">
  <div id="header">
    <img src="perfil.jpeg">
    <div><strong>Bot ❤️</strong></div>
  </div>

  <div id="chat"></div>

  <div id="inputArea">
    <input id="inputMensaje">
    <button onclick="enviarMensaje()">➤</button>
  </div>
</div>

<!-- SOBRE -->
<div id="sobre">
  <div class="sobre-box" onclick="abrirSobre()">
    💌
    <p>Tienes una carta</p>
  </div>
</div>

<!-- CARTA -->
<div id="carta">
  <div class="carta-contenido">
    <img src="foto.jpg" class="foto" id="fotoCarta">
    <h2 id="tituloCarta">Feliz cumpleaños ❤️</h2>
    <p id="textoCarta">Gracias por cada momento contigo 💖</p>
  </div>
</div>

</div>

<script>
let paso = 0, seguridad = 0;

function verificar() {
  if (clave.value.toLowerCase() === "nayeli juanita") {
    login.style.display="none";
    magia.style.display="flex";
    iniciarMagia();
  } else {
    error.style.display="block";
    pistaBox.style.display="block";
  }
}

function mostrarPista() {
  pista.innerText="nombre especial que te dice Emerson";
}

function iniciarMagia() {
  textoMagico.innerText="Hola Nayeli 💖";
  setTimeout(()=>{
    magia.style.display="none";
    app.style.display="flex";
    chatContainer.style.display="flex";
    bot("Hola Nayeli ❤️");
  },2000);
}

function bot(t){
  chat.innerHTML+=`<div class="mensaje recibido">${t}</div>`;
  chat.scrollTop=chat.scrollHeight;
}

function user(t){
  chat.innerHTML+=`<div class="mensaje enviado">${t}</div>`;
  chat.scrollTop=chat.scrollHeight;
}

function enviarMensaje(){
  let t=inputMensaje.value.toLowerCase().trim();
  if(!t)return;
  user(inputMensaje.value);
  inputMensaje.value="";
  setTimeout(()=>responder(t),500);
}

function responder(t){
  if(paso===0 && t.includes("hola")){
    bot("¿Hoy es tu cumpleaños?");
    paso=1; return;
  }

  if(paso===1 && (t.includes("si")||t.includes("sí"))){
    bot("¿Quieres ver tu regalo?");
    paso=2; return;
  }

  if(paso===2){
    if(seguridad===0 && (t.includes("si")||t.includes("sí"))){
      bot("¿Dónde nos vimos?");
      seguridad=1; return;
    }

    if(seguridad===1){
      if(t.includes("lurin")){
        bot("¿Quién dio el primer beso?");
        seguridad=2;
      } else bot("intenta otra vez");
      return;
    }

    if(seguridad===2){
      if(t.includes("emerson")){
        chatContainer.style.display="none";
        sobre.style.display="flex";
      } else bot("piénsalo bien 😏");
    }
  }
}

/* SOBRE */
function abrirSobre(){
  sobre.style.display="none";
  carta.style.display="flex";
  animarCarta();
}

/* WOW */
function animarCarta(){
  setTimeout(()=>fotoCarta.classList.add("mostrar-foto"),500);
  setTimeout(()=>tituloCarta.classList.add("mostrar-texto"),1200);
  setTimeout(()=>textoCarta.classList.add("mostrar-texto"),1800);
}

inputMensaje.addEventListener("keypress",e=>{
  if(e.key==="Enter") enviarMensaje();
});
</script>

</body>
</html>
