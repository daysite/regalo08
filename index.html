<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Chat especial ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: url('https://i.imgur.com/1c9d8bA.png'); /* fondo tipo WhatsApp */
  background-size: cover;
}

/* INICIO */
#inicio {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  background: black;
  color: white;
}

button {
  padding: 12px 25px;
  border-radius: 20px;
  border: none;
  background: #25d366;
  color: white;
}

/* CHAT */
#chatContainer {
  display: none;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* HEADER */
#header {
  display: flex;
  align-items: center;
  padding: 10px;
  background: #202c33;
  color: white;
}

#header img {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  margin-right: 10px;
}

/* MENSAJES */
#chat {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
}

.mensaje {
  max-width: 65%;
  padding: 8px;
  margin: 6px;
  border-radius: 10px;
  font-size: 14px;
  color: white;
  position: relative;
  animation: aparecer 0.3s ease;
}

@keyframes aparecer {
  from { transform: scale(0.9); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.enviado {
  background: #005c4b;
  margin-left: auto;
}

.recibido {
  background: #202c33;
}

/* HORA */
.hora {
  font-size: 10px;
  color: #ccc;
  text-align: right;
}

/* CHECK */
.check {
  font-size: 10px;
  margin-left: 5px;
  color: gray;
}

.check.azul {
  color: #53bdeb;
}

/* INPUT */
#inputArea {
  display: flex;
  padding: 10px;
  background: #202c33;
}

#inputMensaje {
  flex: 1;
  padding: 10px;
  border-radius: 20px;
  border: none;
  background: #2a3942;
  color: white;
}

/* ESCRIBIENDO */
#typing {
  font-size: 12px;
  color: #ccc;
  padding-left: 15px;
  animation: blink 1s infinite;
}

@keyframes blink {
  0% { opacity: 0.3; }
  50% { opacity: 1; }
  100% { opacity: 0.3; }
}

/* CARTA */
#carta {
  display: none;
  text-align: center;
  padding: 40px;
  color: white;
}
</style>

</head>

<body>

<div id="inicio">
  <h1>Tengo algo para ti ❤️</h1>
  <button onclick="iniciar()">Entrar</button>
</div>

<div id="chatContainer">

  <div id="header">
    <img src="perfil.jpeg">
    <div>
      <strong>Bot de Daniel ❤️</strong><br>
      <small>en línea</small>
    </div>
  </div>

  <div id="chat"></div>
  <div id="typing"></div>

  <div id="inputArea">
    <input type="text" id="inputMensaje" placeholder="Escribe un mensaje...">
    <button onclick="enviarMensaje()">➤</button>
  </div>
</div>

<div id="carta">
  <h2>🎁 Tu regalo</h2>
  <p>Daniel quería decirte que eres demasiado importante para él ❤️</p>
</div>

<!-- SONIDO -->
<audio id="sonido" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script>
let paso = 0;
let intentosNo = 0;

function hora() {
  let d = new Date();
  return d.getHours() + ":" + ("0" + d.getMinutes()).slice(-2);
}

function sonido() {
  document.getElementById("sonido").play();
}

function iniciar() {
  document.getElementById("inicio").style.display = "none";
  document.getElementById("chatContainer").style.display = "flex";

  setTimeout(() => bot("Hola..."), 1000);
}

function bot(texto) {
  typing(true);

  setTimeout(() => {
    typing(false);

    let msg = document.createElement("div");
    msg.className = "mensaje recibido";
    msg.innerHTML = texto + `<div class="hora">${hora()}</div>`;
    document.getElementById("chat").appendChild(msg);

    sonido();
    scroll();
  }, 1200);
}

function user(texto) {
  let msg = document.createElement("div");
  msg.className = "mensaje enviado";
  msg.innerHTML = texto + `<div class="hora">${hora()} <span class="check">✔</span></div>`;
  document.getElementById("chat").appendChild(msg);

  scroll();

  // animación checks
  setTimeout(() => {
    msg.querySelector(".check").innerText = "✔✔";
  }, 1000);

  setTimeout(() => {
    msg.querySelector(".check").classList.add("azul");
  }, 2000);
}

function typing(estado) {
  document.getElementById("typing").innerText = estado ? "escribiendo..." : "";
}

function scroll() {
  let chat = document.getElementById("chat");
  chat.scrollTop = chat.scrollHeight;
}

function enviarMensaje() {
  let input = document.getElementById("inputMensaje");
  let texto = input.value.toLowerCase().trim();

  if (!texto) return;

  user(input.value);
  input.value = "";

  setTimeout(() => responder(texto), 1000);
}

function responder(texto) {

  if (paso === 0) {
    bot("Hola 😊");
    bot("Soy un bot 🤖");
    bot("Y vengo de parte de Daniel ❤️");
    bot("Tiene algo para ti...");
    bot("¿Quieres verlo?");
    paso = 1;
    return;
  }

  if (paso === 1) {

    if (texto.includes("si") || texto.includes("sí")) {
      bot("Sabía que dirías que sí 😏");
      bot("Prepárate...");
      setTimeout(() => {
        document.getElementById("chatContainer").style.display = "none";
        document.getElementById("carta").style.display = "block";
      }, 2000);
      return;
    }

    if (texto.includes("no")) {
      intentosNo++;

      if (intentosNo === 1) bot("😢 dale una oportunidad...");
      else if (intentosNo === 2) bot("porfa 🥺...");
      else bot("yaaa 😭 solo di que sí jajaja");

      return;
    }

    bot("responde con 'sí' o 'no' 😜");
  }
}
</script>

</body>
</html>
