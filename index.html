<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat especial ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* LOGIN */
#login {
  height: calc(var(--vh) * 100);
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #ffd6e7, #ffeef5);
}

.login-box {
  width: 300px;
  background: white;
  border-radius: 20px;
  padding: 20px;
  text-align: center;
  position: relative;
}

.login-box img {
  position: absolute;
  top: -15px;
  right: -15px;
  width: 70px;
}

.login-box button {
  margin-top: 10px;
  background: #ff4d88;
  color: white;
  border: none;
  padding: 8px 15px;
  border-radius: 20px;
}

/* PANTALLA MAGICA */
#magia {
  display: none;
  height: calc(var(--vh) * 100);
  background: linear-gradient(135deg, #ffb6d9, #ffd6e7);
  color: white;
  font-size: 20px;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 20px;
}

/* CHAT ORIGINAL */
#app {
  display: none;
  height: calc(var(--vh) * 100);
  background: #0b141a;
  flex-direction: column;
}

#chatContainer {
  display: flex;
  flex: 1;
  flex-direction: column;
}

#chat {
  flex: 1;
  padding: 6px;
  overflow-y: auto;
}

.mensaje {
  max-width: 75%;
  padding: 6px 8px;
  margin: 3px;
  border-radius: 8px;
  font-size: 12px;
  color: white;
}

.enviado { background: #005c4b; margin-left: auto; }
.recibido { background: #202c33; }

#inputArea {
  display: flex;
  padding: 6px;
  background: #202c33;
}

#inputMensaje {
  flex: 1;
  padding: 6px;
  border-radius: 15px;
  border: none;
  background: #2a3942;
  color: white;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <img src="https://i.imgur.com/3QZQZ6P.png">
    <h3>Hola Nayeli 💖</h3>
    <p>¿Cuál es tu nombre?</p>
    <input type="text" id="clave">
    <button onclick="verificar()">Entrar</button>

    <p id="error" style="color:red; display:none;">Incorrecto</p>

    <div id="pistaBox" style="display:none;">
      <p>¿Quieres una pista?</p>
      <button onclick="mostrarPista()">Ver</button>
    </div>

    <p id="pista"></p>
  </div>
</div>

<!-- PANTALLA MAGICA -->
<div id="magia">
  <div id="textoMagico"></div>
</div>

<!-- CHAT -->
<div id="app">
  <div id="chatContainer">
    <div id="chat"></div>
    <div id="inputArea">
      <input type="text" id="inputMensaje">
      <button onclick="enviarMensaje()">➤</button>
    </div>
  </div>
</div>

<script>
let paso = 0;

/* LOGIN */
function verificar() {
  let clave = document.getElementById("clave").value.toLowerCase();

  if (clave === "nayeli juanita") {
    document.getElementById("login").style.display = "none";
    document.getElementById("magia").style.display = "flex";
    iniciarMagia();
  } else {
    document.getElementById("error").style.display = "block";
    document.getElementById("pistaBox").style.display = "block";
  }
}

function mostrarPista() {
  document.getElementById("pista").innerText =
    "💡 Es un nombre que Emerson siempre te ha puesto";
}

/* TEXTO MAGICO */
function iniciarMagia() {
  const texto = "Hola Nayeli este regalo fue hecho por Emerson con la mejor intención del mundo y un poquito de estrés pero sobre todo con mucho cariño para ti ❤️";

  let palabras = texto.split(" ");
  let i = 0;

  let intervalo = setInterval(() => {
    document.getElementById("textoMagico").innerHTML += palabras[i] + " ";
    i++;

    if (i >= palabras.length) {
      clearInterval(intervalo);

      setTimeout(() => {
        document.getElementById("magia").style.display = "none";
        document.getElementById("app").style.display = "flex";
        iniciarChat();
      }, 2000);
    }

  }, 300);
}

/* CHAT */
function iniciarChat() {
  bot("Hola Nayeli ❤️");
}

function bot(t) {
  let m = document.createElement("div");
  m.className = "mensaje recibido";
  m.innerText = t;
  document.getElementById("chat").appendChild(m);
}

function user(t) {
  let m = document.createElement("div");
  m.className = "mensaje enviado";
  m.innerText = t;
  document.getElementById("chat").appendChild(m);
}

function enviarMensaje() {
  let input = document.getElementById("inputMensaje");
  let texto = input.value.toLowerCase();

  if (!texto) return;

  user(input.value);
  input.value = "";

  if (texto.includes("hola")) {
    bot("Hola 😊 ¿Cómo estás?");
  }
}
</script>

</body>
</html>
